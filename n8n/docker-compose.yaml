# docker volume create n8n_data
# docker run -it --rm --name n8n -p 5678:5678 -v n8n_data:/home/node/.n8n docker.n8n.io/n8nio/n8n

services:
  n8n:
    image: n8nio/n8n
    container_name: n8n
    restart: always
    volumes:
      - ./persistent/n8n-data:/home/node/.n8n
    ports:
      - "5678:5678"

volumes:
  n8n-data:
    driver: local
